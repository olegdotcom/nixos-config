general {
    # A logind lock request runs one hyprlock instance through this command.
    lock_cmd = pidof hyprlock || hyprlock
    # Ask logind to lock the session before suspend instead of starting a second lock process.
    before_sleep_cmd = loginctl lock-session
    # Re-enable the panel after resume so the first key press is not swallowed.
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    # Lock screen after 10 minutes of inactivity
    timeout = 600
    # This triggers lock_cmd above through logind's session-lock signal.
    on-timeout = loginctl lock-session
}

listener {
    # Turn off display one minute after locking
    timeout = 660
    # DPMS controls display power without suspending the entire laptop.
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    # Suspend after 30 minutes of inactivity
    timeout = 1800
    # systemd performs the normal NixOS suspend sequence.
    on-timeout = systemctl suspend
}
