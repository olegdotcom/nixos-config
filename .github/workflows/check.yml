# Evaluate the flake and enforce formatting on every proposed or merged change.
name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Check flake
        run: nix flake check --no-build
      - name: Check formatting
        run: nix fmt -- --ci
